<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网易云音乐 - 私人漫游</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 全局重置与变量声明 */
        :root {
            --sidebar-width: 220px;
            --player-height: 75px;
            --topbar-height: 60px;
            --main-bg: #ffffff;
            --sidebar-bg: #f3f3f3;
            --text-main: #333333;
            --text-muted: #666666;
            --text-light: #999999;
            --theme-color: #ec4141;
            --theme-hover: #d73a3a;
            --border-color: #e0e0e0;
            --hover-bg: #e7e7e7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft YaHei", sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #f5f5f7;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 布局容器 */
        .app-container {
            display: flex;
            width: 100%;
            height: calc(100vh - var(--player-height));
            position: relative;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px 0 10px 0;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            padding: 0 20px 15px 20px;
            font-size: 18px;
            font-weight: bold;
            color: var(--theme-color);
            letter-spacing: 1px;
        }

        .logo svg { margin-right: 8px; fill: var(--theme-color); }

        .menu-group { margin-bottom: 20px; }
        .menu-group h3 { font-size: 12px; color: var(--text-light); padding: 0 20px 8px 20px; font-weight: normal; }
        .menu-group ul { list-style: none; }

        .menu-group li {
            display: flex;
            align-items: center;
            padding: 9px 20px;
            font-size: 14px;
            color: #444;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-group li:hover { background-color: var(--hover-bg); color: var(--text-main); }

        .menu-group li.active {
            background-color: var(--hover-bg);
            color: var(--text-main);
            font-weight: bold;
            border-left: 3px solid var(--theme-color);
            padding-left: 17px;
        }

        .menu-group li svg { margin-right: 10px; width: 16px; height: 16px; fill: currentColor; }

        .playlist-section {
            flex: 1;
            overflow-y: auto;
            border-top: 1px solid #e8e8e8;
            padding-top: 10px;
        }

        .playlist-section::-webkit-scrollbar { width: 5px; }
        .playlist-section::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .section-title {
            font-size: 12px;
            color: var(--text-light);
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .section-title:hover { color: var(--text-muted); }

        .fav-playlists { list-style: none; }
        .fav-playlists li {
            display: flex;
            align-items: center;
            padding: 6px 20px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .fav-playlists li:hover { background-color: var(--hover-bg); }
        .fav-playlists li svg { margin-right: 8px; flex-shrink: 0; fill: var(--text-muted); }
        .fav-playlists li span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 主内容区域样式 */
        .main-content {
            flex: 1;
            background-color: var(--main-bg);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* 顶部导航条 */
        .top-bar {
            height: var(--topbar-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            background-color: #f7f9fa;
        }

        .search-box {
            display: flex;
            align-items: center;
            background-color: #ededed;
            border-radius: 30px;
            padding: 5px 12px;
            width: 260px;
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-size: 13px;
            width: 100%;
            color: var(--text-main);
            padding-left: 5px;
        }

        .search-box input::placeholder { color: var(--text-light); }
        .search-box svg { fill: var(--text-muted); width: 16px; height: 16px; cursor: pointer; }

        /* 用户状态栏样式 */
        .user-status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile { display: flex; align-items: center; gap: 8px; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ddd;
            cursor: pointer;
        }

        .username { font-size: 14px; color: #4a729a; font-weight: 500; cursor: pointer; }
        .vip-tag {
            display: flex;
            align-items: center;
            background-color: #2b2525;
            color: #e5c494;
            padding: 2px 8px 2px 4px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            height: 20px;
            gap: 4px;
            cursor: pointer;
        }

        .vinyl-icon {
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ff3b30 4px, #111 5px, #333 10px);
            border-radius: 50%;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-icon::after {
            content: '';
            width: 2px;
            height: 2px;
            background-color: #fff;
            border-radius: 50%;
        }

        .vip-text {
            transform: scale(0.9);
            white-space: nowrap;
        }

        .arrow-down {
            color: #666;
            font-size: 12px;
            margin-left: 2px;
            cursor: pointer;
        }

        .icon-actions {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-left: 16px;
            margin-right: 8px;
        }

        .icon-wrapper {
            position: relative;
            color: #555;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .icon-wrapper:hover {
            color: #222;
        }

        .badge {
            position: absolute;
            top: -2px;
            right: -3px;
            width: 6px;
            height: 6px;
            background-color: #ff3b30;
            border-radius: 50%;
            border: 1px solid #f7f9fa;
        }

        .divider {
            width: 1px;
            height: 16px;
            background-color: #ccc;
            margin-right: 12px;
        }

        .window-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #666;
            font-size: 14px;
        }

        .control-btn {
            cursor: pointer;
            transition: color 0.2s;
        }

        .control-btn:hover {
            color: #222;
        }

        /* 可滚动核心内容区 */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 25px 30px;
            display: flex;
            justify-content: center;
        }

        .content-scroll::-webkit-scrollbar { width: 8px; }
        .content-scroll::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        /* 漫游主内容区 */
        .roam-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 0;
        }

        /* 页面标题 */
        .page-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .page-header h1 i {
            color: var(--theme-color);
            font-size: 20px;
        }

        /* 漫游卡片 */
        .roam-card {
            width: 100%;
            max-width: 500px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .roam-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(102, 126, 234, 0.4);
        }

        .roam-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* 专辑封面 */
        .album-cover {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .album-cover:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .album-cover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }

        /* 歌曲信息 */
        .song-info {
            margin-bottom: 30px;
        }

        .song-title {
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .song-artist {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 5px;
        }

        .song-album {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        /* 进度条 */
        .progress-container {
            width: 100%;
            margin-bottom: 25px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: white;
            border-radius: 2px;
            width: 35%;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar-bg:hover .progress-bar::after {
            opacity: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        /* 播放控制 */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.8;
        }

        .control-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .play-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }

        .play-btn.playing {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255,255,255,0); }
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: white;
            transform: translateY(-3px);
        }

        .action-btn i {
            font-size: 22px;
        }

        .action-btn span {
            font-size: 12px;
        }

        .action-btn.liked {
            color: #ff6b6b;
        }

        /* 歌词显示区域 */
        .lyrics-section {
            width: 100%;
            max-width: 500px;
            margin-top: 40px;
            padding: 30px;
            background: rgba(0,0,0,0.05);
            border-radius: 12px;
            text-align: center;
        }

        .lyrics-title {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .lyrics-content {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-muted);
        }

        .lyrics-content p {
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .lyrics-content p.active {
            color: var(--text-main);
            font-weight: 500;
            font-size: 18px;
        }

        /* 播放列表侧边栏 */
        .playlist-sidebar {
            position: fixed;
            right: -350px;
            top: 0;
            bottom: var(--player-height);
            width: 350px;
            background: white;
            border-left: 1px solid var(--border-color);
            transition: right 0.3s ease;
            z-index: 50;
            display: flex;
            flex-direction: column;
        }

        .playlist-sidebar.open {
            right: 0;
        }

        .playlist-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-header h3 {
            font-size: 16px;
            font-weight: bold;
        }

        .playlist-close {
            cursor: pointer;
            font-size: 18px;
            color: var(--text-muted);
        }

        .playlist-items {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background: var(--hover-bg);
        }

        .playlist-item.active {
            background: #fef0f0;
            color: var(--theme-color);
        }

        .playlist-item .item-index {
            width: 30px;
            font-size: 12px;
            color: var(--text-light);
        }

        .playlist-item .item-info {
            flex: 1;
            margin-left: 10px;
        }

        .playlist-item .item-name {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .playlist-item .item-artist {
            font-size: 12px;
            color: var(--text-light);
        }

        .playlist-item .item-duration {
            font-size: 12px;
            color: var(--text-light);
        }

        /* ========== 底部播放控制栏 ========== */
        .player-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: var(--player-height);
            background-color: #ffffff;
            border-top: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .left-panel { display: flex; align-items: center; min-width: 300px; }

        .player-cover {
            position: relative;
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .song-info-player { margin-left: 12px; margin-right: 20px; }
        .song-info-player .song-title-player { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 4px; cursor: pointer; }
        .song-info-player .song-title-player:hover { text-decoration: underline; }
        .song-info-player .artist-player { font-size: 12px; color: #999; }

        .interactions { display: flex; align-items: center; gap: 15px; margin-left: 10px; }
        .icon-btn-count { display: flex; align-items: center; position: relative; color: #666; font-size: 20px; cursor: pointer; }
        .icon-btn-count.liked { color: #ff4d4f; }
        .icon-btn-count .badge { position: absolute; top: -6px; left: 18px; font-size: 9px; color: #ff4d4f; font-weight: bold; white-space: nowrap; transform: scale(0.85); }
        .comment-btn .badge { color: #888; }

        .center-panel { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 45%; }
        .control-row { display: flex; align-items: center; gap: 24px; }
        .ctrl-btn { background: none; border: none; color: #4a5568; font-size: 16px; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { color: #111; }

        .play-pause-btn {
            width: 42px; height: 42px;
            background-color: #ff4242;
            color: #ffffff;
            border-radius: 50%;
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(255,66,66,0.2);
        }
        .play-pause-btn:hover { background-color: #f53131; color: #fff; }

        .right-panel { display: flex; align-items: center; gap: 20px; color: #555; }
        .quality-tag { font-size: 10px; border: 1px solid #777; color: #555; padding: 0 4px; border-radius: 3px; font-weight: bold; letter-spacing: 0.5px; cursor: pointer; transform: scale(0.9); }
        .quality-tag:hover { border-color: #ff4242; color: #ff4242; }
        .right-icon { font-size: 16px; cursor: pointer; transition: color 0.2s; }
        .right-icon:hover { color: #111; }
        .lrc-icon { font-size: 14px; font-weight: bold; border: 1px solid transparent; }
    </style>
</head>

    <script src="js/player.js"></script>
    <script>
        // 漫游卡片元素
        const albumCover = document.getElementById('albumCover');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const songAlbum = document.getElementById('songAlbum');
        const lyricsContent = document.getElementById('lyricsContent');
        const roamPlayBtn = document.getElementById('roamPlayBtn');
        const roamPlayIcon = document.getElementById('roamPlayIcon');
        const roamPrevBtn = document.getElementById('roamPrevBtn');
        const roamNextBtn = document.getElementById('roamNextBtn');
        const roamLikeBtn = document.getElementById('roamLikeBtn');
        const commentBtn = document.getElementById('commentBtn');
        const shareBtn = document.getElementById('shareBtn');
        const playlistBtn = document.getElementById('playlistBtn');
        const playlistSidebar = document.getElementById('playlistSidebar');
        const closePlaylist = document.getElementById('closePlaylist');
        const playlistItems = document.getElementById('playlistItems');
        const playlistCount = document.getElementById('playlistCount');
        const showPlaylistBtn = document.getElementById('showPlaylistBtn');
        const roamProgressBg = document.getElementById('roamProgressBg');
        const roamProgressBar = document.getElementById('roamProgressBar');
        const roamCurrentTime = document.getElementById('roamCurrentTime');
        const roamTotalTime = document.getElementById('roamTotalTime');

        // 卡片内控制 → 调用共享播放器
        roamPlayBtn.addEventListener('click', () => NeteasePlayer.toggle());
        roamPrevBtn.addEventListener('click', () => NeteasePlayer.prev());
        roamNextBtn.addEventListener('click', () => NeteasePlayer.next());
        roamLikeBtn.addEventListener('click', () => NeteasePlayer.toggleLike());

        // 卡片进度条点击跳转
        roamProgressBg.addEventListener('click', (e) => {
            const rect = roamProgressBg.getBoundingClientRect();
            NeteasePlayer.seek((e.clientX - rect.left) / rect.width);
        });

        // 评论/分享提示
        commentBtn.addEventListener('click', () => alert('评论功能开发中...'));
        shareBtn.addEventListener('click', () => alert('分享功能开发中...'));

        // 播放列表侧栏开关
        playlistBtn.addEventListener('click', () => playlistSidebar.classList.toggle('open'));
        showPlaylistBtn.addEventListener('click', () => playlistSidebar.classList.toggle('open'));
        closePlaylist.addEventListener('click', () => playlistSidebar.classList.remove('open'));

        // 渲染播放列表（核心歌单）
        function renderPlaylist(snap) {
            const curIdx = snap ? snap.index : NeteasePlayer.getState().index;
            playlistItems.innerHTML = NeteasePlayer.playlist.map((song, i) => `
                <div class="playlist-item${i === curIdx ? ' active' : ''}" data-index="${i}">
                    <span class="item-index">${String(i + 1).padStart(2, '0')}</span>
                    <div class="item-info">
                        <div class="item-name">${song.name}</div>
                        <div class="item-artist">${song.artist}</div>
                    </div>
                    <span class="item-duration">--:--</span>
                </div>
            `).join('');
            playlistCount.textContent = `(${NeteasePlayer.playlist.length})`;
            playlistItems.querySelectorAll('.playlist-item').forEach(item => {
                item.addEventListener('click', () => {
                    NeteasePlayer.playByIndex(parseInt(item.dataset.index));
                });
            });
        }
        renderPlaylist();

        // 同步卡片信息、歌词、侧栏高亮、按钮状态
        NeteasePlayer.onChange((snap) => {
            const song = snap.song;
            albumCover.style.background = NeteasePlayer.coverStyle(song);
            albumCover.innerHTML = '';
            songTitle.textContent = song.name;
            songArtist.textContent = song.artist;
            songAlbum.textContent = '专辑：' + song.album;

            // 歌词
            lyricsContent.innerHTML = song.lyrics
                .map((line, i) => `<p${i === 0 ? ' class="active"' : ''}>${line}</p>`)
                .join('');

            // 卡片播放键图标 + 脉冲
            roamPlayIcon.className = snap.playing ? 'fa-solid fa-pause' : 'fa-solid fa-play';
            roamPlayBtn.classList.toggle('playing', snap.playing);

            // 卡片喜欢
            const likeIcon = roamLikeBtn.querySelector('i');
            roamLikeBtn.classList.toggle('liked', snap.liked);
            if (likeIcon) {
                likeIcon.classList.toggle('fa-solid', snap.liked);
                likeIcon.classList.toggle('fa-regular', !snap.liked);
            }

            // 侧栏高亮
            playlistItems.querySelectorAll('.playlist-item').forEach(item => {
                item.classList.toggle('active', parseInt(item.dataset.index) === snap.index);
            });
        });

        // 卡片进度条 + 时间
        NeteasePlayer.onProgress((cur, dur) => {
            const pct = dur ? (cur / dur) * 100 : 0;
            roamProgressBar.style.width = pct + '%';
            roamCurrentTime.textContent = NeteasePlayer.formatTime(cur);
            roamTotalTime.textContent = NeteasePlayer.formatTime(dur);

            // 歌词逐句高亮（按进度均分）
            const lines = lyricsContent.querySelectorAll('p');
            if (lines.length && dur) {
                const active = Math.min(lines.length - 1, Math.floor((cur / dur) * lines.length));
                lines.forEach((p, i) => p.classList.toggle('active', i === active));
            }
        });

        // 侧边栏导航高亮
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
