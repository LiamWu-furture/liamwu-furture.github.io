<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网易云音乐 - 我喜欢的音乐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", -apple-system, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 1. 左侧侧边栏 --- */
        .sidebar {
            width: 220px;
            background-color: #f3f3f3;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 15px 0 10px 0;
            flex-shrink: 0;
        }
        .logo {
            display: flex;
            align-items: center;
            padding: 0 20px 15px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #ec4141;
            letter-spacing: 1px;
        }
        .logo svg { margin-right: 8px; }
        .menu-group { margin-bottom: 20px; }
        .menu-group h3 { font-size: 12px; color: #999; padding: 0 20px 8px 20px; font-weight: normal; }
        .menu-group ul { list-style: none; }
        .menu-group li { display: flex; align-items: center; padding: 9px 20px; font-size: 14px; color: #444; cursor: pointer; transition: all 0.2s ease; }
        .menu-group li:hover { background-color: #e7e7e9; color: #333; }
        .menu-group li.active { background-color: #e7e7e9; color: #333; font-weight: bold; border-left: 3px solid #ec4141; padding-left: 17px; }
        .menu-group li svg { margin-right: 10px; width: 16px; height: 16px; fill: currentColor; }
        .playlist-section { flex: 1; overflow-y: auto; border-top: 1px solid #e8e8e8; padding-top: 10px; }
        .playlist-section::-webkit-scrollbar { width: 5px; }
        .playlist-section::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }
        .sidebar-title { font-size: 12px; color: #999; padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sidebar-title:hover { color: #666; }
        .fav-playlists { list-style: none; }
        .fav-playlists li { display: flex; align-items: center; padding: 6px 20px; font-size: 13px; color: #444; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .fav-playlists li:hover { background-color: #e7e7e9; }
        .fav-playlists li svg { margin-right: 8px; flex-shrink: 0; fill: #666; }
        .fav-playlists li span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- 2. 主体内容区域 --- */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background-color: #ffffff;
            padding-bottom: 75px;
        }

        /* 顶部导航栏 */
        .header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #e0e0e0;
            flex-shrink: 0;
            background-color: #f7f9fa;
        }
        .search-box {
            display: flex;
            align-items: center;
            background-color: #ededed;
            border-radius: 30px;
            padding: 5px 12px;
            width: 260px;
        }
        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-size: 13px;
            width: 100%;
            color: #333;
            padding-left: 5px;
        }
        .search-box input::placeholder { color: #999; }
        .search-box svg { fill: #666; width: 16px; height: 16px; cursor: pointer; }

        /* 用户状态栏样式 */
        .user-status-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile { display: flex; align-items: center; gap: 8px; }
        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ddd;
            cursor: pointer;
        }
        .username { font-size: 14px; color: #4a729a; font-weight: 500; cursor: pointer; }
        .vip-tag {
            display: flex;
            align-items: center;
            background-color: #2b2525;
            color: #e5c494;
            padding: 2px 8px 2px 4px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            height: 20px;
            gap: 4px;
            cursor: pointer;
        }

        .vinyl-icon {
            width: 16px;
            height: 16px;
            background: radial-gradient(circle, #ff3b30 4px, #111 5px, #333 10px);
            border-radius: 50%;
            border: 1px solid #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vinyl-icon::after {
            content: '';
            width: 2px;
            height: 2px;
            background-color: #fff;
            border-radius: 50%;
        }

        .vip-text {
            transform: scale(0.9);
            white-space: nowrap;
        }

        .arrow-down {
            color: #8a9aa8;
            font-size: 12px;
            margin-left: 2px;
            cursor: pointer;
        }

        .icon-actions {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-left: 16px;
            margin-right: 8px;
        }

        .icon-wrapper {
            position: relative;
            color: #667684;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .icon-wrapper:hover {
            color: #333;
        }

        .badge {
            position: absolute;
            top: -2px;
            right: -3px;
            width: 6px;
            height: 6px;
            background-color: #ff3b30;
            border-radius: 50%;
            border: 1px solid #f7f9fa;
        }

        .divider {
            width: 1px;
            height: 16px;
            background-color: #e1e6eb;
            margin-right: 12px;
        }

        .window-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #8a9aa8;
            font-size: 14px;
        }

        .control-btn {
            cursor: pointer;
            transition: color 0.2s;
        }

        .control-btn:hover {
            color: #333;
        }

        /* 滚动内容区 */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 25px 30px;
        }

        /* 歌单头部 */
        .playlist-header {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
        }
        .playlist-cover {
            width: 180px;
            height: 180px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            flex-shrink: 0;
            position: relative;
        }
        .playlist-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .playlist-cover::after {
            content: '\f004';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: rgba(255,255,255,0.85);
            background: rgba(236,65,65,0.25);
        }
        .author-avatar-sm { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .playlist-info { display: flex; flex-direction: column; justify-content: space-between; padding: 5px 0; }
        .playlist-tag {
            border: 1px solid #ec4141;
            color: #ec4141;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 12px;
            display: inline-block;
            margin-right: 10px;
        }
        .playlist-title { font-size: 22px; font-weight: bold; display: flex; align-items: center; }
        .playlist-author { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #666; margin: 10px 0; }
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            height: 32px;
            padding: 0 18px;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            background-color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn:hover { background-color: #f5f5f5; }
        .btn-primary { background-color: #ec4141; color: #fff; border: none; }
        .btn-primary:hover { background-color: #d73a3a; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 30px;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }
        .tab-item {
            padding: 10px 0;
            cursor: pointer;
            position: relative;
            font-size: 14px;
            color: #666;
            transition: color 0.2s;
        }
        .tab-item.active { color: #333; font-weight: bold; }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 3px;
            background-color: #ec4141;
            border-radius: 2px;
        }

        /* 歌曲列表表格 */
        .song-table { width: 100%; border-collapse: collapse; text-align: left; table-layout: fixed; }
        .song-table th, .song-table td { padding: 8px 10px; font-size: 13px; vertical-align: middle; }
        .song-table th { color: #999; font-weight: normal; border-bottom: 1px solid #eee; }
        .song-table tbody tr { color: #666; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid #f5f5f5; }
        .song-table tbody tr:hover { background-color: #f7f7f9; }
        .col-num { width: 48px; text-align: center; color: #bbb; font-size: 12px; }
        .col-song { width: auto; color: #333; }
        .col-album { width: 22%; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-end { width: 110px; text-align: right; white-space: nowrap; }
        .song-row-main { display: flex; align-items: center; min-width: 0; gap: 10px; }
        .song-cover-thumb {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .song-meta { min-width: 0; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; line-height: 1.4; }
        .song-name { font-size: 14px; color: #333; font-weight: 500; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tag-sq {
            font-size: 10px;
            color: #e65c00;
            border: 1px solid rgba(230, 92, 0, 0.45);
            padding: 0 4px;
            border-radius: 3px;
            line-height: 16px;
            flex-shrink: 0;
        }
        .song-artist-inline { font-size: 13px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-end .fa-heart { font-size: 15px; color: #ccc; margin-right: 18px; vertical-align: middle; }
        .col-end .fa-heart.liked { color: #ec4141; }
        .song-duration { font-size: 13px; color: #bbb; display: inline-block; min-width: 42px; text-align: right; }
        tr.playing { background-color: #f5f5f7 !important; }
        tr.playing .song-name { color: #ec4141; }
        tr.playing .col-num { color: #ec4141; }

        /* --- 3. 底部播放控制栏 --- */
        .player-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background-color: #ffffff;
            border-top: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        .left-panel { display: flex; align-items: center; min-width: 300px; }
        .album-cover {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }
        .song-info { margin-left: 12px; margin-right: 20px; }
        .song-info .song-title { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 4px; cursor: pointer; }
        .song-info .song-title:hover { text-decoration: underline; }
        .song-info .artist { font-size: 12px; color: #999; }
        .interactions { display: flex; align-items: center; gap: 15px; margin-left: 10px; }
        .icon-btn-count { display: flex; align-items: center; position: relative; color: #666; font-size: 20px; cursor: pointer; }
        .icon-btn-count.liked { color: #ff4d4f; }
        .icon-btn-count .badge { position: absolute; top: -6px; left: 18px; font-size: 9px; color: #ff4d4f; font-weight: bold; white-space: nowrap; transform: scale(0.85); }
        .comment-btn .badge { color: #888; }
        .center-panel { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 45%; }
        .control-row { display: flex; align-items: center; gap: 24px; }
        .ctrl-btn { background: none; border: none; color: #4a5568; font-size: 16px; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; justify-content: center; }
        .ctrl-btn:hover { color: #111; }
        .play-pause-btn {
            width: 42px; height: 42px;
            background-color: #ff4242;
            color: #ffffff;
            border-radius: 50%;
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(255,66,66,0.2);
        }
        .play-pause-btn:hover { background-color: #f53131; color: #fff; }
        .right-panel { display: flex; align-items: center; gap: 20px; color: #555; }
        .quality-tag { font-size: 10px; border: 1px solid #777; color: #555; padding: 0 4px; border-radius: 3px; font-weight: bold; letter-spacing: 0.5px; cursor: pointer; transform: scale(0.9); }
        .quality-tag:hover { border-color: #ff4242; color: #ff4242; }
        .right-icon { font-size: 16px; cursor: pointer; transition: color 0.2s; }
        .right-icon:hover { color: #111; }
        .lrc-icon { font-size: 14px; font-weight: bold; border: 1px solid transparent; }
    </style>
</head>

            <div class="user-status-bar">
                <div class="user-profile">
                    <img class="avatar" src="images/head.jpg" alt="avatar">
                    <span class="username">wujia</span>
                    <div class="vip-tag">
                        <div class="vinyl-icon"></div>
                        <span class="vip-text">VIP 8</span>
                    </div>
                    <i class="fa-solid fa-chevron-down arrow-down"></i>
                </div>

                <div class="icon-actions">
                    <div class="icon-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <div class="badge"></div>
                    </div>
                    <div class="icon-wrapper">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5" /><circle cx="12" cy="12" r="3" /></svg>
                    </div>
                    <div class="icon-wrapper">
                        <i class="fa-solid fa-shirt"></i>
                        <div class="badge"></div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="window-controls">
                    <i class="fa-regular fa-window-restore control-btn" style="font-size: 13px;"></i>
                    <i class="fa-solid fa-minus control-btn"></i>
                    <i class="fa-regular fa-square control-btn" style="font-size: 12px;"></i>
                    <i class="fa-solid fa-xmark control-btn" style="font-size: 15px;"></i>
                </div>
            </div>
        </header>

        <div class="content-scroll">
            <div class="playlist-header">
                <div class="playlist-cover">
                    <img src="images/songs/shaonian.jpg" alt="你曾是少年">
                </div>
                <div class="playlist-info">

                        <div class="playlist-title">
                            <span class="playlist-tag">歌单</span> 我喜欢的音乐
                        </div>
                        <div class="playlist-author">
                            <img class="author-avatar-sm" src="images/head.jpg" alt="wujia">
                            <span>wujia</span>
                            <span style="color:#999;">2018-12-16 创建</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-primary"><i class="fa-solid fa-play"></i> 播放全部</button>
                        <button class="btn"><i class="fa-solid fa-download"></i> 下载全部</button>
                        <button class="btn"><i class="fa-solid fa-ellipsis"></i></button>
                    </div>
                </div>
            </div>

            <div class="tabs">
                <div class="tab-item active">歌曲列表 (5)</div>
                <div class="tab-item">评论</div>
                <div class="tab-item">收藏者</div>
            </div>

            <table class="song-table">
                <thead>
                    <tr>
                        <th class="col-num"></th>

    <!-- 隐藏的音频播放器 -->
    <audio id="audioPlayer" preload="auto"></audio>

    <div class="player-bar">
        <div class="left-panel">
            <div class="album-cover" id="trackCover" style="background: linear-gradient(135deg, #ff5e62, #ff9966);"></div>
            <div class="song-info">
                <div class="song-title" id="trackName">有什么不同</div>
                <div class="artist" id="artistName">曲婉婷</div>
            </div>
            <div class="interactions">
                <div class="icon-btn-count liked" id="likeBtn">
                    <i class="fa-solid fa-heart"></i>
                    <span class="badge">100w+</span>
                </div>
                <div class="icon-btn-count comment-btn">
                    <i class="fa-regular fa-comment-dots"></i>
                    <span class="badge">10w+</span>
                </div>
            </div>
        </div>
        <div class="center-panel">
            <div class="control-row">
                <button class="ctrl-btn" title="顺序播放" id="modeBtn"><i class="fa-solid fa-list-ol"></i></button>
                <button class="ctrl-btn" title="上一首" id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
                <button class="ctrl-btn play-pause-btn" title="播放" id="playBtn"><i class="fa-solid fa-play" id="playIcon"></i></button>
                <button class="ctrl-btn" title="下一首" id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
                <button class="ctrl-btn" title="播放列表"><i class="fa-solid fa-bars-staggered"></i></button>
            </div>
            
            <div class="player-time-row">
                <span id="currentTime">00:00</span>
                <span id="totalTime">00:00</span>
            </div>
        </div>
        <div class="right-panel">
            <span class="quality-tag">极高</span>
            <i class="fa-regular fa-square-plus right-icon" title="边听边存"></i>
            <span class="right-icon lrc-icon" title="歌词" style="font-family: sans-serif;">词</span>
            <i class="fa-solid fa-volume-high right-icon" id="volumeIcon" title="音量"></i>
            <div style="width:70px; height:4px; background:#e0e0e0; border-radius:2px; cursor:pointer;" id="volumeContainer">
                <div style="height:100%; width:70%; background:#ec4141; border-radius:2px;" id="volumeBar"></div>
            </div>
            <i class="fa-solid fa-ellipsis right-icon" title="更多"></i>
        </div>
    </div>

    <script src="js/player.js"></script>
    <script>
        const songList = document.getElementById('songList');
        const playAllBtn = document.querySelector('.action-buttons .btn-primary');

        // 用核心歌单渲染"我喜欢的音乐"列表
        function renderList() {
            const liked = NeteasePlayer.getState().liked;
            songList.innerHTML = NeteasePlayer.playlist.map((song, i) => `
                <tr data-index="${i}">
                    <td class="col-num">${String(i + 1).padStart(2, '0')}</td>
                    <td class="col-song">
                        <div class="song-row-main">
                            ${song.cover ? `<img class="song-cover-thumb" src="${song.cover}" alt="${song.name}">` : ''}
                            <div class="song-meta">
                                <span class="song-name">${song.name}</span>
                                <span class="tag-sq">SQ</span>
                                <span class="song-artist-inline">${song.artist}</span>
                            </div>
                        </div>
                    </td>
                    <td class="col-album">${song.album}</td>
                    <td class="col-end">
                        <i class="fa-solid fa-heart liked"></i>
                        <span class="song-duration">${song.duration || '--:--'}</span>
                    </td>
                </tr>
            `).join('');
        }
        renderList();

        // 点击行播放（心形单独处理）
        songList.addEventListener('click', (e) => {
            const heartEl = e.target.closest('.col-end .fa-heart');
            if (heartEl) {
                heartEl.classList.toggle('liked');
                heartEl.classList.toggle('fa-solid');
                heartEl.classList.toggle('fa-regular');
                return;
            }
            const row = e.target.closest('tr');
            if (!row) return;
            NeteasePlayer.playByIndex(parseInt(row.dataset.index));
        });

        playAllBtn.addEventListener('click', () => NeteasePlayer.playByIndex(0));

        // 高亮当前播放行 + 时长显示
        NeteasePlayer.onChange((snap) => {
            songList.querySelectorAll('tr').forEach(row => {
                const i = parseInt(row.dataset.index);
                const numCell = row.querySelector('.col-num');
                const isCur = i === snap.index;
                row.classList.toggle('playing', isCur);
                if (numCell) {
                    numCell.innerHTML = isCur
                        ? '<i class="fa-solid fa-volume-high"></i>'
                        : String(i + 1).padStart(2, '0');
                }
            });
        });

        // 搜索框：过滤行
        const searchInput = document.querySelector('.search-box input');
        if (searchInput) {
            const doFilter = () => {
                const kw = searchInput.value.trim().toLowerCase();
                songList.querySelectorAll('tr').forEach(row => {
                    const title = row.querySelector('.song-name')?.textContent.toLowerCase() || '';
                    const artist = row.querySelector('.song-artist-inline')?.textContent.toLowerCase() || '';
                    row.style.display = (!kw || title.includes(kw) || artist.includes(kw)) ? '' : 'none';
                });
            };
            searchInput.addEventListener('input', doFilter);
            searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doFilter(); });
        }
    </script>
</body>
